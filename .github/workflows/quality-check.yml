name: "Quality Check"

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: "quality-check-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Setup deps"
        uses: "./.github/actions/setup-deps"

      - name: "Run quality check"
        run: "pnpm quality:check"
